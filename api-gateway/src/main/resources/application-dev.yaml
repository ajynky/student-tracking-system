spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "https://student-tracking-system-omega.vercel.app"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
          routes:
            - id: auth-service
              uri: http://localhost:9093
              predicates:
                - Path=/auth/**
              filters:
                - JwtAuthenticationFilter

            - id: user-service
              uri: http://localhost:9093
              predicates:
                - Path=/users/**
              filters:
                - JwtAuthenticationFilter

            - id: student-service
              uri: http://localhost:9095
              predicates:
                - Path=/students/**
              filters:
                - JwtAuthenticationFilter

            - id: classes-service
              uri: http://localhost:9095
              predicates:
                - Path=/classes/**
              filters:
                - JwtAuthenticationFilter

            - id: grades-service
              uri: http://localhost:9095
              predicates:
                - Path=/grades/**
              filters:
                - JwtAuthenticationFilter

            - id: assignments-service
              uri: http://localhost:9095
              predicates:
                - Path=/assignments/**
              filters:
                - JwtAuthenticationFilter

            - id: files-service
              uri: http://localhost:9095
              predicates:
                - Path=/files/**
              filters:
                - JwtAuthenticationFilter

            - id: attendance-service
              uri: http://localhost:9092
              predicates:
                - Path=/attendance/**
              filters:
                - JwtAuthenticationFilter

            - id: notification-service
              uri: http://localhost:9094
              predicates:
                - Path=/notifications/**
              filters:
                - JwtAuthenticationFilter

server:
  port: 9091

jwt:
  secret: your-super-secret-key-minimum-32-characters-long

sentry:
  dsn: https://public@sentry.example.com/1
  traces-sample-rate: 1.0
  enabled: false