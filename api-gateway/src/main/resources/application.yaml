spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "https://student-tracking-system-omega.vercel.app"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
          routes:
            - id: auth-service
              uri: ${SERVICES_AUTH_SERVICE:http://localhost:9093}
              predicates:
                - Path=/auth/**
              filters:
                - JwtAuthenticationFilter

            - id: user-service
              uri: ${SERVICES_AUTH_SERVICE:http://localhost:9093}
              predicates:
                - Path=/users/**
              filters:
                - JwtAuthenticationFilter

            - id: student-service
              uri: ${SERVICES_STUDENT_SERVICE:http://localhost:9095}
              predicates:
                - Path=/students/**
              filters:
                - JwtAuthenticationFilter

            - id: classes-service
              uri: ${SERVICES_STUDENT_SERVICE:http://localhost:9095}
              predicates:
                - Path=/classes/**
              filters:
                - JwtAuthenticationFilter

            - id: grades-service
              uri: ${SERVICES_STUDENT_SERVICE:http://localhost:9095}
              predicates:
                - Path=/grades/**
              filters:
                - JwtAuthenticationFilter

            - id: assignments-service
              uri: ${SERVICES_STUDENT_SERVICE:http://localhost:9095}
              predicates:
                - Path=/assignments/**
              filters:
                - JwtAuthenticationFilter

            - id: files-service
              uri: ${SERVICES_STUDENT_SERVICE:http://localhost:9095}
              predicates:
                - Path=/files/**
              filters:
                - JwtAuthenticationFilter

            - id: attendance-service
              uri: ${SERVICES_ATTENDANCE_SERVICE:http://localhost:9092}
              predicates:
                - Path=/attendance/**
              filters:
                - JwtAuthenticationFilter

            - id: notification-service
              uri: ${SERVICES_NOTIFICATION_SERVICE:http://localhost:9094}
              predicates:
                - Path=/notifications/**
              filters:
                - JwtAuthenticationFilter

server:
  port: ${PORT:9091}

jwt:
  secret: ${JWT_SECRET}

sentry:
  dsn: ${SENTRY_DSN}
  traces-sample-rate: 1.0
  enabled: ${SENTRY_ENABLED:false}