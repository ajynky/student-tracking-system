---
name: Project Automation
on:
  create: null
  pull_request:
    types:
      - opened
      - closed
  workflow_run:
    workflows:
      - Build and Deploy
    types:
      - completed
jobs:
  move-to-in-progress:
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.ref }}"
          ISSUE=$(echo $BRANCH | grep -oP '(?<=/)\d+' | head -1)
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT
      - name: Move issue to In Progress
        if: steps.extract.outputs.issue != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: >
            const issue = parseInt('${{ steps.extract.outputs.issue }}');

            const projectNumber = 4;

            const owner = 'ajynky';


            const projectQuery = await github.graphql(`
              query {
                user(login: "${owner}") {
                  projectV2(number: ${projectNumber}) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `);


            const project = projectQuery.user.projectV2;

            const statusField = project.fields.nodes.find(f => f.name === 'Status');

            const inProgressOption = statusField.options.find(o => o.name === 'In Progress');


            const itemsQuery = await github.graphql(`
              query {
                user(login: "${owner}") {
                  projectV2(number: ${projectNumber}) {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue { number }
                        }
                      }
                    }
                  }
                }
              }
            `);


            const item = itemsQuery.user.projectV2.items.nodes
              .find(i => i.content?.number === issue);
            if (!item) return;


            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${project.id}"
                  itemId: "${item.id}"
                  fieldId: "${statusField.id}"
                  value: { singleSelectOptionId: "${inProgressOption.id}" }
                }) { projectV2Item { id } }
              }
            `);
  move-to-in-review:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issue to In Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: >
            const body = context.payload.pull_request.body || '';

            const match = body.match(/Closes #(\d+)/i);

            if (!match) return;

            const issue = parseInt(match[1]);

            const projectNumber = 4;

            const owner = 'ajynky';


            const projectQuery = await github.graphql(`
              query {
                user(login: "${owner}") {
                  projectV2(number: ${projectNumber}) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `);


            const project = projectQuery.user.projectV2;

            const statusField = project.fields.nodes.find(f => f.name === 'Status');

            const inReviewOption = statusField.options.find(o => o.name === 'In Review');


            const itemsQuery = await github.graphql(`
              query {
                user(login: "${owner}") {
                  projectV2(number: ${projectNumber}) {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue { number }
                        }
                      }
                    }
                  }
                }
              }
            `);


            const item = itemsQuery.user.projectV2.items.nodes
              .find(i => i.content?.number === issue);
            if (!item) return;


            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${project.id}"
                  itemId: "${item.id}"
                  fieldId: "${statusField.id}"
                  value: { singleSelectOptionId: "${inReviewOption.id}" }
                }) { projectV2Item { id } }
              }
            `);
  create-bug-on-failure:
    if: >
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion
      == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Create bug issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: >
            const run = context.payload.workflow_run;

            await github.rest.issues.create({
              owner: 'ajynky',
              repo: 'student-tracking-system',
              title: `[Bug] Deploy failed — ${run.head_commit.message}`,
              body: `## Deploy Failure\n\n**Workflow:** ${run.name}\n**Branch:** ${run.head_branch}\n**Commit:** ${run.head_sha}\n**Run URL:** ${run.html_url}\n\n## Steps to investigate\n- [ ] Check workflow logs\n- [ ] Fix the issue\n- [ ] Re-run deploy`,
              labels: ['bug', 'devops'],
            });
