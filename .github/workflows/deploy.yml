name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Build Docker images and push to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api-gateway
        uses: docker/build-push-action@v4
        with:
          context: ./api-gateway
          push: true
          tags: ghcr.io/ajynky/api-gateway:latest

      - name: Build and push auth-service
        uses: docker/build-push-action@v4
        with:
          context: ./auth-service
          push: true
          tags: ghcr.io/ajynky/auth-service:latest

      - name: Build and push student-service
        uses: docker/build-push-action@v4
        with:
          context: ./student-service
          push: true
          tags: ghcr.io/ajynky/student-service:latest

      - name: Build and push attendance-service
        uses: docker/build-push-action@v4
        with:
          context: ./attendance-service
          push: true
          tags: ghcr.io/ajynky/attendance-service:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v4
        with:
          context: ./notification-service
          push: true
          tags: ghcr.io/ajynky/notification-service:latest

  # ─────────────────────────────────────────────
  # Job 2 — Sync GitHub Secrets → Railway env vars
  # Runs only after images are successfully built
  # ─────────────────────────────────────────────
  sync-secrets:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # ── api-gateway ──────────────────────────
      - name: Sync api-gateway secrets
        run: |
          railway variables \
            --set "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set "SENTRY_DSN=${{ secrets.SENTRY_DSN_GATEWAY }}" \
            --set "SENTRY_ENABLED=true" \
            --set "SERVICES_AUTH_SERVICE=http://auth-service.railway.internal:8080" \
            --set "SERVICES_STUDENT_SERVICE=http://student-service.railway.internal:8080" \
            --set "SERVICES_ATTENDANCE_SERVICE=http://attendance-service.railway.internal:8080" \
            --set "SERVICES_NOTIFICATION_SERVICE=http://notification-service.railway.internal:8080" \
            --service api-gateway \
            --environment production

      # ── auth-service ─────────────────────────
      - name: Sync auth-service secrets
        run: |
          railway variables \
            --set "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}" \
            --set "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
            --set "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            --set "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set "JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}" \
            --set "SENTRY_DSN=${{ secrets.SENTRY_DSN_AUTH }}" \
            --set "SENTRY_ENABLED=true" \
            --service auth-service \
            --environment production

      # ── student-service ──────────────────────
      - name: Sync student-service secrets
        run: |
          railway variables \
            --set "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}" \
            --set "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
            --set "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            --set "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
            --set "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --set "SERVICES_NOTIFICATION_SERVICE=http://notification-service.railway.internal:8080" \
            --set "SENTRY_DSN=${{ secrets.SENTRY_DSN_STUDENT }}" \
            --set "SENTRY_ENABLED=true" \
            --service student-service \
            --environment production

      # ── attendance-service ───────────────────
      - name: Sync attendance-service secrets
        run: |
          railway variables \
            --set "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}" \
            --set "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
            --set "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            --set "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set "SERVICES_NOTIFICATION_SERVICE=http://notification-service.railway.internal:8080" \
            --set "SENTRY_DSN=${{ secrets.SENTRY_DSN_ATTENDANCE }}" \
            --set "SENTRY_ENABLED=true" \
            --service attendance-service \
            --environment production

      # ── notification-service ─────────────────
      - name: Sync notification-service secrets
        run: |
          railway variables \
            --set "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}" \
            --set "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
            --set "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            --set "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
            --set "RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}" \
            --set "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" \
            --set "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" \
            --set "TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}" \
            --set "SENTRY_DSN=${{ secrets.SENTRY_DSN_NOTIFICATION }}" \
            --set "SENTRY_ENABLED=true" \
            --service notification-service \
            --environment production
