name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api-gateway
        uses: docker/build-push-action@v4
        with:
          context: ./api-gateway
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:latest

      - name: Build and push auth-service
        uses: docker/build-push-action@v4
        with:
          context: ./auth-service
          push: true
          tags: ghcr.io/${{ github.repository }}/auth-service:latest

      - name: Build and push student-service
        uses: docker/build-push-action@v4
        with:
          context: ./student-service
          push: true
          tags: ghcr.io/${{ github.repository }}/student-service:latest

      - name: Build and push attendance-service
        uses: docker/build-push-action@v4
        with:
          context: ./attendance-service
          push: true
          tags: ghcr.io/${{ github.repository }}/attendance-service:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v4
        with:
          context: ./notification-service
          push: true
          tags: ghcr.io/${{ github.repository }}/notification-service:latest