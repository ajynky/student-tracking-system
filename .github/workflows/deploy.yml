name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1 — Build all 5 services IN PARALLEL with caching
  #   Optimizations:
  #   - Matrix strategy: all 5 services build simultaneously
  #   - Maven cache: dependencies not re-downloaded between runs
  #   - Docker layer cache: unchanged layers reused between runs
  # ─────────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - student-service
          - attendance-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 with Maven cache
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'                  # caches ~/.m2 between runs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ghcr.io/ajynky/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}   # reuse cached layers
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

