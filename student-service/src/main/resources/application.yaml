spring:
  application:
    name: student-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:9095}

jwt:
  secret: ${JWT_SECRET}

supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage:
    bucket: assignments

services:
  notification-service: ${SERVICES_NOTIFICATION_SERVICE:http://localhost:9094}

sentry:
  dsn: ${SENTRY_DSN}
  traces-sample-rate: 1.0
  enabled: ${SENTRY_ENABLED:false}