  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  storage:
    bucket: assignments

services:
  notification-service: ${SERVICES_NOTIFICATION_SERVICE:http://localhost:9094}

sentry:
  dsn: ${SENTRY_DSN:}
