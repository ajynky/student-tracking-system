spring:
  application:
    name: student-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.taevafrvhdlcjulzbxnw}
    password: ${SPRING_DATASOURCE_PASSWORD:YOUR_PASSWORD}
