---
jwt:
  expiration: ${JWT_EXPIRATION:86400000}
  secret: ${JWT_SECRET}
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
sentry:
  dsn: ${SENTRY_DSN}
  enabled: ${SENTRY_ENABLED:false}
  traces-sample-rate: 1
server:
  compression:
    enabled: true
    mime-types: application/json,text/plain
    min-response-size: 1024
  port: ${PORT:8080}
spring:
  application:
    name: auth-service
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      data-source-properties:
        prepareThreshold: 0
      maximum-pool-size: 5
      minimum-idle: 2
    password: ${SPRING_DATASOURCE_PASSWORD}
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false