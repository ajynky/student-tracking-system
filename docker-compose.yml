version: '3.8'

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "9091:8080"
    environment:
      - SERVICES_AUTH_SERVICE=http://auth-service:9093
      - SERVICES_STUDENT_SERVICE=http://student-service:9095
      - SERVICES_ATTENDANCE_SERVICE=http://attendance-service:9092
      - SERVICES_NOTIFICATION_SERVICE=http://notification-service:9094
      - JWT_SECRET=${JWT_SECRET}
      - SENTRY_DSN=${SENTRY_DSN_GATEWAY}
      - SENTRY_ENABLED=false
    depends_on:
      - auth-service
      - student-service
      - attendance-service
      - notification-service

  auth-service:
    build: ./auth-service
    ports:
      - "9093:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - SENTRY_DSN=${SENTRY_DSN_AUTH}
      - SENTRY_ENABLED=false

  student-service:
    build: ./student-service
    ports:
      - "9095:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICES_NOTIFICATION_SERVICE=http://notification-service:9094
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SENTRY_DSN=${SENTRY_DSN_STUDENT}
      - SENTRY_ENABLED=false

  attendance-service:
    build: ./attendance-service
    ports:
      - "9092:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICES_NOTIFICATION_SERVICE=http://notification-service:9094
      - SENTRY_DSN=${SENTRY_DSN_ATTENDANCE}
      - SENTRY_ENABLED=false

  notification-service:
    build: ./notification-service
    ports:
      - "9094:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      - SENTRY_DSN=${SENTRY_DSN_NOTIFICATION}
      - SENTRY_ENABLED=false
