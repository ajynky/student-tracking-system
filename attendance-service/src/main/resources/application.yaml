spring:
  application:
    name: attendance-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

server:
  port: ${PORT:9092}

jwt:
  secret: ${JWT_SECRET}

services:
  notification-service: ${SERVICES_NOTIFICATION_SERVICE:http://localhost:9094}

sentry:
  dsn: ${SENTRY_DSN}
  traces-sample-rate: 1.0
  enabled: ${SENTRY_ENABLED:false}